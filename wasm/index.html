<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SRGAN Live Preview — In-Browser Upscaling</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f1117;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem}
h1{font-size:1.6rem;margin-bottom:.3rem;color:#fff}
.subtitle{color:#888;font-size:.9rem;margin-bottom:1.5rem}
.drop-zone{width:100%;max-width:600px;border:2px dashed #444;border-radius:12px;padding:3rem 2rem;text-align:center;cursor:pointer;transition:all .2s}
.drop-zone:hover,.drop-zone.active{border-color:#6c63ff;background:rgba(108,99,255,.06)}
.drop-zone p{font-size:1rem;color:#aaa}
.drop-zone .icon{font-size:2.5rem;margin-bottom:.5rem;display:block}
input[type=file]{display:none}
.controls{margin-top:1.2rem;display:flex;gap:1rem;align-items:center;flex-wrap:wrap;justify-content:center}
.controls label{font-size:.85rem;color:#aaa}
.controls select,.controls button{padding:.5rem 1rem;border-radius:6px;border:1px solid #333;background:#1a1d28;color:#e0e0e0;font-size:.85rem;cursor:pointer}
.controls button{background:#6c63ff;border-color:#6c63ff;font-weight:600;color:#fff}
.controls button:hover{background:#574fd6}
.controls button:disabled{opacity:.4;cursor:not-allowed}
#download-btn{background:#2ea043;border-color:#2ea043}
#download-btn:hover{background:#278a38}
.panels{display:flex;gap:1.5rem;margin-top:1.5rem;flex-wrap:wrap;justify-content:center;width:100%;max-width:1100px}
.panel{flex:1;min-width:300px;background:#1a1d28;border-radius:10px;padding:1rem;text-align:center}
.panel h3{font-size:.85rem;color:#888;margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.05em}
.panel img{max-width:100%;max-height:400px;border-radius:6px;image-rendering:auto}
.info{margin-top:1rem;font-size:.8rem;color:#666;text-align:center;max-width:600px}
.status{margin-top:.8rem;font-size:.85rem;color:#6c63ff;min-height:1.2em}
.hidden{display:none}
</style>
</head>
<body>
<h1>SRGAN Live Preview</h1>
<p class="subtitle">Drag-drop an image for instant in-browser upscaling via WebAssembly</p>

<div class="drop-zone" id="drop-zone">
  <span class="icon">&#128444;</span>
  <p>Drag &amp; drop an image here, or click to browse</p>
  <input type="file" id="file-input" accept="image/*">
</div>

<div class="controls">
  <label>Scale:
    <select id="scale-select">
      <option value="2">2x</option>
      <option value="4" selected>4x</option>
    </select>
  </label>
  <button id="upscale-btn" disabled>Upscale</button>
  <button id="download-btn" class="hidden" disabled>Download Result</button>
</div>

<p class="status" id="status"></p>

<div class="panels hidden" id="panels">
  <div class="panel">
    <h3>Before</h3>
    <img id="img-before" alt="Original">
    <p class="status" id="info-before"></p>
  </div>
  <div class="panel">
    <h3>After</h3>
    <img id="img-after" alt="Upscaled">
    <p class="status" id="info-after"></p>
  </div>
</div>

<p class="info">
  Upscaling runs entirely in your browser via WebAssembly &mdash; no data leaves your machine.<br>
  For full neural-network (SRGAN) quality, use the <a href="/api/v1/upscale" style="color:#6c63ff">REST API</a>.
</p>

<script type="module">
import init, { upscale_image, model_info, version } from './pkg/srgan_wasm_preview.js';

let wasmReady = false;
let currentFileBytes = null;
let currentFileName = '';
let lastResultBlob = null;

const dropZone   = document.getElementById('drop-zone');
const fileInput   = document.getElementById('file-input');
const upscaleBtn  = document.getElementById('upscale-btn');
const downloadBtn = document.getElementById('download-btn');
const scaleSelect = document.getElementById('scale-select');
const status      = document.getElementById('status');
const panels      = document.getElementById('panels');
const imgBefore   = document.getElementById('img-before');
const imgAfter    = document.getElementById('img-after');
const infoBefore  = document.getElementById('info-before');
const infoAfter   = document.getElementById('info-after');

async function initWasm() {
  try {
    await init();
    wasmReady = true;
    const info = JSON.parse(model_info());
    status.textContent = `WASM ready (v${version()}) — ${info.method} preview`;
    setTimeout(() => { if (status.textContent.startsWith('WASM')) status.textContent = ''; }, 2500);
  } catch (e) {
    status.textContent = 'WASM failed to load — build with: cd wasm && ./build.sh';
    console.warn('WASM init failed:', e);
  }
}
initWasm();

// --- File handling ---
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('active'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('active'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('active');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFile(fileInput.files[0]); });

async function handleFile(file) {
  if (!file.type.startsWith('image/')) { status.textContent = 'Please select an image file'; return; }
  currentFileName = file.name.replace(/\.[^.]+$/, '');

  // Convert to PNG via canvas for WASM compatibility
  const pngBytes = await convertToPng(file);
  currentFileBytes = pngBytes;

  const blob = new Blob([pngBytes], { type: 'image/png' });
  imgBefore.src = URL.createObjectURL(blob);
  imgBefore.onload = () => {
    infoBefore.textContent = `${imgBefore.naturalWidth} x ${imgBefore.naturalHeight}`;
  };
  panels.classList.remove('hidden');
  imgAfter.src = '';
  infoAfter.textContent = '';
  upscaleBtn.disabled = !wasmReady;
  downloadBtn.classList.add('hidden');
  downloadBtn.disabled = true;
  lastResultBlob = null;
  status.textContent = `Loaded: ${file.name}`;
}

async function convertToPng(file) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      canvas.toBlob(blob => {
        blob.arrayBuffer().then(buf => resolve(new Uint8Array(buf)));
      }, 'image/png');
    };
    img.src = URL.createObjectURL(file);
  });
}

// --- Upscale ---
upscaleBtn.addEventListener('click', () => {
  if (!currentFileBytes || !wasmReady) return;
  const scale = parseInt(scaleSelect.value);
  status.textContent = 'Upscaling...';
  upscaleBtn.disabled = true;

  requestAnimationFrame(() => {
    setTimeout(() => {
      const t0 = performance.now();
      try {
        const resultBytes = upscale_image(currentFileBytes, scale);
        const elapsed = (performance.now() - t0).toFixed(0);

        lastResultBlob = new Blob([resultBytes], { type: 'image/png' });
        imgAfter.src = URL.createObjectURL(lastResultBlob);
        imgAfter.onload = () => {
          infoAfter.textContent = `${imgAfter.naturalWidth} x ${imgAfter.naturalHeight} (${scale}x)`;
        };
        status.textContent = `Done in ${elapsed}ms (${scale}x bilinear)`;
        downloadBtn.classList.remove('hidden');
        downloadBtn.disabled = false;
      } catch (e) {
        status.textContent = `Error: ${e}`;
        console.error(e);
      }
      upscaleBtn.disabled = false;
    }, 10);
  });
});

// --- Download ---
downloadBtn.addEventListener('click', () => {
  if (!lastResultBlob) return;
  const scale = scaleSelect.value;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(lastResultBlob);
  a.download = `${currentFileName}_${scale}x.png`;
  a.click();
});
</script>
</body>
</html>

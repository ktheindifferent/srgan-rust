apiVersion: apps/v1
kind: Deployment
metadata:
  name: srgan-api
  namespace: srgan
  labels:
    app: srgan-api
    version: "0.2.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: srgan-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: srgan-api
        version: "0.2.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: srgan-api
          image: ghcr.io/your-org/srgan-rust:0.2.0
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/srgan-rust"]
          args:
            - server
            - --host=0.0.0.0
            - --port=8080
            - --rate-limit=$(RATE_LIMIT_RPM)
            - --max-size=$(MAX_UPLOAD_SIZE)
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: RUST_LOG
              valueFrom:
                configMapKeyRef:
                  name: srgan-config
                  key: RUST_LOG
            - name: SRGAN_MODEL_PATH
              valueFrom:
                configMapKeyRef:
                  name: srgan-config
                  key: SRGAN_MODEL_PATH
            - name: SRGAN_CACHE_DIR
              valueFrom:
                configMapKeyRef:
                  name: srgan-config
                  key: SRGAN_CACHE_DIR
            - name: SRGAN_MAX_WORKERS
              valueFrom:
                configMapKeyRef:
                  name: srgan-config
                  key: SRGAN_MAX_WORKERS
            - name: RATE_LIMIT_RPM
              valueFrom:
                configMapKeyRef:
                  name: srgan-config
                  key: RATE_LIMIT_RPM
            - name: MAX_UPLOAD_SIZE
              valueFrom:
                configMapKeyRef:
                  name: srgan-config
                  key: MAX_UPLOAD_SIZE
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: srgan-secrets
                  key: JWT_SECRET
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: srgan-secrets
                  key: API_KEY
            - name: STRIPE_KEY
              valueFrom:
                secretKeyRef:
                  name: srgan-secrets
                  key: STRIPE_KEY
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: srgan-secrets
                  key: S3_ACCESS_KEY
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: srgan-secrets
                  key: S3_SECRET_KEY
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          volumeMounts:
            - name: models
              mountPath: /models
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: srgan-models-pvc
        - name: tmp
          emptyDir:
            sizeLimit: 2Gi
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: ["srgan-api"]
                topologyKey: kubernetes.io/hostname

services:
  srgan-api:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=sqlite:///app/data/srgan.db
      - RUST_LOG=info
      - SRGAN_MODEL_PATH=/app/models
      - SRGAN_MAX_WORKERS=${SRGAN_MAX_WORKERS:-4}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "srgan-rust", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - srgan-api
    restart: unless-stopped

  # Batch processing service (run manually: docker compose run srgan-batch)
  srgan-batch:
    build: .
    profiles:
      - tools
    volumes:
      - ./input:/app/input:ro
      - ./output:/app/output
    environment:
      - RUST_LOG=info
    entrypoint: ["srgan-rust", "batch"]
    command: ["/app/input", "/app/output"]

  # Training service (run manually: docker compose run srgan-train)
  srgan-train:
    build: .
    profiles:
      - tools
    volumes:
      - ./training_data:/app/training_data:ro
      - ./models:/app/models
    environment:
      - RUST_LOG=info
    entrypoint: ["srgan-rust", "train"]
    command: ["-r", "/app/training_data", "/app/models/custom_model.rsr"]

name: Thread Safety Validation

on:
  pull_request:
    paths:
      - 'src/**/*.rs'
      - 'tests/**/*.rs'
      - 'Cargo.toml'
      - '.github/workflows/thread-safety.yml'
  push:
    branches:
      - main
      - master
      - 'fix/**'
      - 'feature/**'

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  miri:
    name: Miri Safety Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust nightly and Miri
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: miri
      
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Run Miri on thread safety tests
        run: |
          # Run Miri on specific thread safety tests
          cargo +nightly miri test --tests thread_safe_network::tests::
          cargo +nightly miri test --tests parallel::tests::
          cargo +nightly miri test --tests gpu::tests::
        continue-on-error: true  # Miri might find issues we're fixing
      
      - name: Run Miri on integration tests
        run: |
          cargo +nightly miri test --test thread_safety_stress -- --test-threads=1
        continue-on-error: true

  loom:
    name: Loom Concurrency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Run Loom tests
        run: |
          # Loom tests require specific feature flag
          cargo test --test thread_safety_loom --features loom
        env:
          LOOM_MAX_THREADS: 4
          LOOM_CHECKPOINT_INTERVAL: 100
      
      - name: Check for Loom failures
        if: failure()
        run: |
          echo "Loom detected potential race conditions or deadlocks"
          echo "Please review the test output for details"

  thread-sanitizer:
    name: ThreadSanitizer Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
      
      - name: Install LLVM tools
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm clang
      
      - name: Build with ThreadSanitizer
        run: |
          export RUSTFLAGS="-Z sanitizer=thread"
          export TSAN_OPTIONS="halt_on_error=1"
          cargo +nightly build --tests --target x86_64-unknown-linux-gnu
        continue-on-error: true
      
      - name: Run tests with ThreadSanitizer
        run: |
          export RUSTFLAGS="-Z sanitizer=thread"
          export TSAN_OPTIONS="halt_on_error=1:history_size=7"
          cargo +nightly test --tests --target x86_64-unknown-linux-gnu -- --test-threads=1
        continue-on-error: true

  stress-tests:
    name: Stress Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        test: [
          "stress_test_high_contention_thread_safe_network",
          "stress_test_parallel_network_rapid_cloning", 
          "stress_test_gpu_memory_allocation",
          "stress_test_buffer_pool_race_conditions",
          "stress_test_mixed_operations"
        ]
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Run stress test - ${{ matrix.test }}
        run: |
          cargo test --test thread_safety_stress ${{ matrix.test }} --release -- --nocapture
        timeout-minutes: 5
      
      - name: Check test results
        if: failure()
        run: |
          echo "Stress test ${{ matrix.test }} failed"
          echo "This indicates potential thread safety issues under high load"

  valgrind-helgrind:
    name: Valgrind Helgrind Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install Valgrind
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind
      
      - name: Build test binary
        run: |
          cargo build --tests --release
      
      - name: Run Helgrind on tests
        run: |
          # Find test binaries
          for test_bin in target/release/deps/*-*; do
            if [[ -x "$test_bin" && ! "$test_bin" == *.d ]]; then
              echo "Running Helgrind on $(basename $test_bin)"
              valgrind --tool=helgrind --error-exitcode=1 \
                --suppressions=.valgrind-suppressions \
                "$test_bin" --test-threads=1 || true
            fi
          done
        continue-on-error: true

  unsafe-review:
    name: Unsafe Code Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install cargo-audit and cargo-geiger
        run: |
          cargo install cargo-audit cargo-geiger
      
      - name: Check for vulnerable dependencies
        run: cargo audit
      
      - name: Count unsafe code usage
        run: |
          echo "=== Unsafe code statistics ==="
          cargo geiger --print-unused
      
      - name: Verify unsafe impl documentation
        run: |
          echo "=== Checking unsafe impl documentation ==="
          # Check that all unsafe impls have SAFETY comments
          for file in src/thread_safe_network.rs src/parallel.rs src/gpu.rs; do
            echo "Checking $file..."
            if grep -q "unsafe impl" "$file"; then
              if ! grep -B10 "unsafe impl" "$file" | grep -q "SAFETY:"; then
                echo "ERROR: Missing SAFETY documentation in $file"
                exit 1
              else
                echo "✓ SAFETY documentation found in $file"
              fi
            fi
          done

  summary:
    name: Thread Safety Summary
    runs-on: ubuntu-latest
    needs: [miri, loom, thread-sanitizer, stress-tests, valgrind-helgrind, unsafe-review]
    if: always()
    steps:
      - name: Summary Report
        run: |
          echo "=== Thread Safety Validation Summary ==="
          echo ""
          echo "This workflow validates thread safety through multiple approaches:"
          echo "1. Miri - Detects undefined behavior and data races"
          echo "2. Loom - Model checking for concurrency bugs"
          echo "3. ThreadSanitizer - Runtime race detection"
          echo "4. Stress Tests - High-load concurrent testing"
          echo "5. Helgrind - Valgrind's thread error detector"
          echo "6. Unsafe Review - Validates unsafe code documentation"
          echo ""
          echo "All checks must pass before merging to ensure thread safety."